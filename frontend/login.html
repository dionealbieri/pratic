<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRATIC — Entrar no Sistema</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Syne:wght@400..800&display=swap" rel="stylesheet">
  
  <!-- Global Stylesheet -->
  <link rel="stylesheet" href="/css/common.css?v=2">

  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: radial-gradient(circle at 10% 20%, rgba(240, 180, 41, 0.05) 0%, transparent 40%),
                  radial-gradient(circle at 90% 80%, rgba(59, 130, 246, 0.05) 0%, transparent 40%),
                  var(--bg);
      position: relative;
      overflow: hidden;
    }

    /* Background animated shapes */
    .shape-bg {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      filter: blur(100px);
      z-index: 1;
      opacity: 0.3;
      pointer-events: none;
    }

    .shape-1 {
      background: var(--accent);
      top: -100px;
      left: -100px;
      animation: float 20s infinite alternate;
    }

    .shape-2 {
      background: var(--accent2);
      bottom: -150px;
      right: -100px;
      animation: float 25s infinite alternate-reverse;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 50px) scale(1.2); }
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 40px;
      background: rgba(22, 25, 32, 0.65);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      z-index: 10;
      transition: transform 0.3s ease, border-color 0.3s;
    }

    [data-theme="light"] .login-container {
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(0, 0, 0, 0.08);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo {
      font-family: var(--font-head);
      font-size: 32px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: 3px;
      margin-bottom: 6px;
      text-transform: uppercase;
      text-shadow: 0 2px 10px rgba(240, 180, 41, 0.1);
    }

    .login-subtitle {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .form-group {
      margin-bottom: 22px;
      position: relative;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      opacity: 0.85;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper span.icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 16px;
      transition: color 0.2s;
    }

    .form-control {
      width: 100%;
      padding: 14px 14px 14px 42px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      outline: none;
      transition: all 0.2s;
    }

    .form-control:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(240, 180, 41, 0.15);
    }

    .form-control:focus + span.icon {
      color: var(--accent);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #000;
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-top: 10px;
      box-shadow: 0 4px 12px rgba(240, 180, 41, 0.2);
    }

    .btn-login:hover {
      transform: translateY(-2px);
      filter: brightness(1.1);
      box-shadow: 0 6px 18px rgba(240, 180, 41, 0.35);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      background: var(--muted);
      color: var(--surface);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .login-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 8px;
      padding: 12px;
      color: var(--danger);
      font-size: 13px;
      margin-bottom: 20px;
      text-align: center;
      display: none;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .theme-toggle-login {
      position: absolute;
      top: 24px;
      right: 24px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      transition: all 0.2s;
      z-index: 100;
    }

    .theme-toggle-login:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <!-- Floating background blobs -->
  <div class="shape-bg shape-1"></div>
  <div class="shape-bg shape-2"></div>

  <!-- Theme toggle -->
  <button class="theme-toggle-login" id="themeBtn" title="Alternar tema">
    🌓
  </button>

  <div class="login-container">
    <div class="login-header">
      <div class="login-logo">PRATIC</div>
      <div class="login-subtitle">Produção & Gestão</div>
    </div>

    <div class="login-error" id="errorBox">
      Erro ao fazer login.
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Usuário</label>
        <div class="input-wrapper">
          <input type="text" id="username" class="form-control" placeholder="Digite seu usuário" required autocomplete="username">
          <span class="icon">👤</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <div class="input-wrapper">
          <input type="password" id="password" class="form-control" placeholder="Digite sua senha" required autocomplete="current-password">
          <span class="icon">🔒</span>
        </div>
      </div>

      <button type="submit" class="btn-login" id="btnSubmit">Entrar</button>
    </form>
  </div>

  <script>
    // Theme Manager
    const themeBtn = document.getElementById('themeBtn');
    let currentTheme = localStorage.getItem('theme') || 'dark';
    
    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      if (theme === 'light') {
        themeBtn.textContent = '🌙';
      } else {
        themeBtn.textContent = '☀️';
      }
    }
    
    applyTheme(currentTheme);
    
    themeBtn.addEventListener('click', () => {
      currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
      applyTheme(currentTheme);
    });

    // Login Form logic
    const form = document.getElementById('loginForm');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const errorBox = document.getElementById('errorBox');
    const btnSubmit = document.getElementById('btnSubmit');

    // Extrair redirecionamento se houver
    const urlParams = new URLSearchParams(window.location.search);
    const redirectUrl = urlParams.get('redirect') || '/';

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      errorBox.style.display = 'none';
      btnSubmit.disabled = true;
      btnSubmit.textContent = 'Autenticando...';
      
      const payload = {
        username: usernameInput.value,
        password: passwordInput.value
      };

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.detail || 'Usuário ou senha incorretos.');
        }

        // Login feito com sucesso
        // Cookies de sessão HTTPOnly são definidos pelo browser automaticamente
        
        // Salva dados no localStorage para o front-end
        localStorage.setItem('user_nome', data.usuario.nome);
        localStorage.setItem('user_role', data.usuario.role);
        localStorage.setItem('user_username', data.usuario.username);

        // Redireciona para o painel apropriado ou destino salvo
        window.location.href = redirectUrl;
        
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.style.display = 'block';
        btnSubmit.disabled = false;
        btnSubmit.textContent = 'Entrar';
        
        // Efeito de tremer no container do erro
        errorBox.style.animation = 'none';
        errorBox.offsetHeight; /* trigger reflow */
        errorBox.style.animation = null; 
      }
    });
  </script>
</body>
</html>
